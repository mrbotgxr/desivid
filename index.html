<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Demo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:linear-gradient(135deg,#0E203F,#1e3a8a);
  color:#fff;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}
nav h2{color:#F0A31D}
nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}
nav a{color:#fff;text-decoration:none}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}
.hero h1{
  font-size:2.5rem;
}
.hero button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#F0A31D;
  color:#000;
  border-radius:6px;
  cursor:pointer;
}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
}

/* COUNTER */
.stats{
  display:flex;
  justify-content:space-around;
  padding:40px;
}
.stat{text-align:center}
.stat h2{color:#F0A31D}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:.7;
}
</style>
</head>

<body>

<nav>
  <h2>MySite</h2>
  <ul>
    <li><a href="#hero">Home</a></li>
    <li><a href="#features">Features</a></li>
    <li><a href="#stats">Stats</a></li>
  </ul>
</nav>

<section class="hero" id="hero">
  <h1>🚀 Your Website is Live</h1>
  <p>Now you can build anything here</p>
  <button onclick="alert('Button works!')">Click Me</button>
</section>

<section class="features" id="features">
  <div class="card">
    <h3>⚡ Fast</h3>
    <p>Hosted on GitHub Pages</p>
  </div>
  <div class="card">
    <h3>🌐 Custom Domain</h3>
    <p>Your own domain connected</p>
  </div>
  <div class="card">
    <h3>🎨 Modern UI</h3>
    <p>Clean and responsive design</p>
  </div>
</section>

<section class="stats" id="stats">
  <div class="stat">
    <h2 id="count1">0</h2>
    <p>Visitors</p>
  </div>
  <div class="stat">
    <h2 id="count2">0</h2>
    <p>Projects</p>
  </div>
  <div class="stat">
    <h2 id="count3">0</h2>
    <p>Success</p>
  </div>
</section>

<footer>
  <p>© 2026 Your Website</p>
</footer>

<script>
// Smooth scroll
document.querySelectorAll('a').forEach(anchor=>{
  anchor.addEventListener('click',function(e){
    e.preventDefault();
    document.querySelector(this.getAttribute('href'))
      .scrollIntoView({behavior:'smooth'});
  });
});

// Counter animation
function animate(id,target){
  let i=0;
  let el=document.getElementById(id);
  let interval=setInterval(()=>{
    i+=Math.ceil(target/100);
    if(i>=target){
      i=target;
      clearInterval(interval);
    }
    el.innerText=i;
  },20);
}

animate("count1",500);
animate("count2",120);
animate("count3",99);
</script>

</body>
</html>
